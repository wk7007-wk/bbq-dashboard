function unlock(){
var p=document.getElementById("pw").value;
if(!p)return;
try{
var raw=atob(E);
var d=[];
for(var i=0;i<raw.length;i++)d.push(String.fromCharCode(raw.charCodeAt(i)^p.charCodeAt(i%p.length)));
var b64=d.join("");
var bytes=atob(b64);
var utf8=decodeURIComponent(bytes.split("").map(function(c){return"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)}).join(""));
if(utf8.indexOf('<div id="app">')<0)throw"x";
document.getElementById("gate").style.display="none";
var ct=document.getElementById("content");
ct.style.display="block";
ct.innerHTML=utf8;
}catch(e){
document.getElementById("err").style.display="block";
document.getElementById("pw").value="";
document.getElementById("pw").focus();
}
}
document.getElementById("pw").addEventListener("keyup",function(e){if(e.key==="Enter")unlock()});
function setLang(l){
document.querySelectorAll(".kr").forEach(function(e){e.style.display=l==="kr"?"":"none"});
document.querySelectorAll(".jp").forEach(function(e){e.style.display=l==="jp"?"":"none"});
}
</script>
