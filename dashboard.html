<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>현황판</title>
<style>
:root {
  --bg-primary: #1a1a2e;
  --bg-card: #16213e;
  --bg-card-hover: #1a2744;
  --border-card: #0f3460;
  --text-primary: #e0e0e0;
  --text-secondary: #8892a0;
  --text-muted: #5a6270;
  --accent-blue: #4fc3f7;
  --accent-green: #66bb6a;
  --accent-orange: #ffa726;
  --accent-red: #ef5350;
  --accent-purple: #ab47bc;
  --accent-cyan: #26c6da;
  --accent-yellow: #ffee58;
  --accent-pink: #ec407a;
  --radius: 12px;
  --gap: 12px;
  --font: -apple-system, 'Noto Sans KR', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  padding: var(--gap);
  padding-top: calc(48px + env(safe-area-inset-top, 0px));
  padding-bottom: calc(var(--gap) + env(safe-area-inset-bottom, 0px));
}

/* 상단 바 */
.top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: calc(44px + env(safe-area-inset-top, 0px));
  padding-top: env(safe-area-inset-top, 0px);
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-card);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-left: 16px;
  padding-right: 16px;
  z-index: 100;
}

.top-bar .title {
  font-size: 15px;
  font-weight: 600;
  color: var(--accent-blue);
}

.top-bar .status {
  font-size: 12px;
  color: var(--text-muted);
}

.top-bar .status .dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-green);
  margin-right: 4px;
  vertical-align: middle;
}

/* 2열 레이아웃: 좌측 생활정보 + 우측 운영모니터링 */
.layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--gap);
  max-width: 600px;
  margin: 0 auto;
}

.column {
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}

.bottom-wide {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius);
  padding: 14px;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  transition: background 0.2s;
}

.card:active {
  background: var(--bg-card-hover);
}

.card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.card-icon {
  font-size: 18px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  flex-shrink: 0;
}

.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
}

.card-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.card-value {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.2;
}

.card-sub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

.card-list {
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-secondary);
}

.card-list .item {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-list .item + .item {
  margin-top: 2px;
}

/* 카드별 아이콘 배경 */
.icon-pc { background: rgba(79,195,247,0.15); color: var(--accent-blue); }
.icon-weather { background: rgba(255,167,38,0.15); color: var(--accent-orange); }
.icon-schedule { background: rgba(102,187,106,0.15); color: var(--accent-green); }
.icon-order { background: rgba(236,64,122,0.15); color: var(--accent-pink); }
.icon-ai { background: rgba(171,71,188,0.15); color: var(--accent-purple); }
.icon-diag { background: rgba(38,198,218,0.15); color: var(--accent-cyan); }
.icon-alert { background: rgba(239,83,80,0.15); color: var(--accent-red); }
.icon-excel { background: rgba(255,238,88,0.15); color: var(--accent-yellow); }
.icon-news { background: rgba(79,195,247,0.15); color: var(--accent-blue); }
.icon-sns { background: rgba(236,64,122,0.15); color: var(--accent-pink); }

/* 상태 뱃지 */
.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1.4;
}
.badge-ok { background: rgba(102,187,106,0.2); color: var(--accent-green); }
.badge-warn { background: rgba(255,167,38,0.2); color: var(--accent-orange); }
.badge-err { background: rgba(239,83,80,0.2); color: var(--accent-red); }
.badge-info { background: rgba(79,195,247,0.2); color: var(--accent-blue); }

/* 뉴스 링크 스타일 */
.news-link {
  display: block;
  color: var(--text-secondary);
  text-decoration: none;
  padding: 3px 0;
  font-size: 12px;
  line-height: 1.5;
  border-bottom: 1px solid rgba(15,52,96,0.5);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.news-link:last-child {
  border-bottom: none;
}

.news-link:active {
  color: var(--accent-blue);
}

/* 로딩 스켈레톤 */
.skeleton {
  background: var(--bg-card-hover);
  border-radius: 4px;
  height: 20px;
  width: 60%;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* 갱신 표시 */
.refreshing .top-bar .dot {
  animation: pulse 0.5s infinite alternate;
}

@keyframes pulse {
  from { opacity: 1; }
  to { opacity: 0.3; }
}

/* 스크롤바 */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-card); border-radius: 2px; }
</style>
</head>
<body>

<div class="top-bar">
  <span class="title">현황판</span>
  <span class="status"><span class="dot"></span><span id="lastUpdate">--:--</span></span>
</div>

<div class="layout">

  <!-- 좌측: 생활정보 -->
  <div class="column">

    <!-- 날씨 -->
    <div class="card" id="card-weather">
      <div class="card-header">
        <div class="card-icon icon-weather">&#9788;</div>
        <div class="card-title">날씨</div>
      </div>
      <div class="card-body">
        <div id="weather-body">
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

    <!-- 경제/AI 뉴스 -->
    <div class="card" id="card-news">
      <div class="card-header">
        <div class="card-icon icon-news">&#9993;</div>
        <div class="card-title">경제/AI 뉴스</div>
      </div>
      <div class="card-body">
        <div id="news-body">
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

    <!-- SNS 이슈 -->
    <div class="card" id="card-sns">
      <div class="card-header">
        <div class="card-icon icon-sns">&#9729;</div>
        <div class="card-title">SNS 이슈</div>
      </div>
      <div class="card-body">
        <div id="sns-body">
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

    <!-- 스포츠 -->
    <div class="card" id="card-sports">
      <div class="card-header">
        <div class="card-icon" style="background:#2e7d32">&#9917;</div>
        <div class="card-title">스포츠</div>
      </div>
      <div class="card-body">
        <div class="card-list" id="sports-body">
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- 우측: 운영 모니터링 -->
  <div class="column">

    <!-- PC 상태 -->
    <div class="card" id="card-pc">
      <div class="card-header">
        <div class="card-icon icon-pc">&#9211;</div>
        <div class="card-title">PC 상태</div>
      </div>
      <div class="card-body">
        <div class="card-list" id="pc-body">
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

    <!-- AI 활동 -->
    <div class="card" id="card-ai">
      <div class="card-header">
        <div class="card-icon icon-ai">&#9881;</div>
        <div class="card-title">AI 활동</div>
      </div>
      <div class="card-body">
        <div id="ai-body">
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

    <!-- 주문 현황 -->
    <div class="card" id="card-order">
      <div class="card-header">
        <div class="card-icon icon-order">&#9733;</div>
        <div class="card-title">주문 현황</div>
      </div>
      <div class="card-body">
        <div id="order-body">
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

    <!-- 진단 보고서 -->
    <div class="card" id="card-diag">
      <div class="card-header">
        <div class="card-icon icon-diag">&#9874;</div>
        <div class="card-title">진단 보고서</div>
      </div>
      <div class="card-body">
        <div class="card-list" id="diag-body">
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

    <!-- 알림/경고 -->
    <div class="card" id="card-alert">
      <div class="card-header">
        <div class="card-icon icon-alert">&#9888;</div>
        <div class="card-title">알림 / 경고</div>
      </div>
      <div class="card-body">
        <div class="card-list" id="alert-body">
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- 하단 풀 와이드 -->
  <div class="bottom-wide">

    <!-- 근무표 -->
    <div class="card" id="card-schedule">
      <div class="card-header">
        <div class="card-icon icon-schedule">&#9779;</div>
        <div class="card-title">근무표</div>
      </div>
      <div class="card-body">
        <div class="card-list" id="schedule-body">
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

    <!-- 엑셀 정산 -->
    <div class="card" id="card-excel">
      <div class="card-header">
        <div class="card-icon icon-excel">&#9638;</div>
        <div class="card-title">엑셀 정산</div>
      </div>
      <div class="card-body">
        <div class="card-list" id="excel-body">
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
var FB = 'https://poskds-4ba60-default-rtdb.asia-southeast1.firebasedatabase.app';
var PROXY = 'https://api.allorigins.win/get?url=';
var NEWS_RSS = 'https://news.google.com/rss/search?q=%ED%95%98%EC%9D%B4%EB%8B%89%EC%8A%A4+OR+%EC%82%BC%EC%84%B1%EC%A0%84%EC%9E%90+OR+AI&hl=ko&gl=KR&ceid=KR:ko';
var TRENDS_RSS = 'https://trends.google.co.kr/trending/rss?geo=KR';

// 뉴스 갱신 간격 (5분) -- 30초 주기와 별도 관리
var NEWS_INTERVAL_MS = 5 * 60 * 1000;
var lastNewsFetch = 0;

// HTML 이스케이프 (XSS 방지)
function esc(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

// 시간 포맷
function timeStr(ts) {
  if (!ts) return '--';
  var d = new Date(typeof ts === 'number' ? ts : Date.parse(ts));
  return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function agoStr(ts) {
  if (!ts) return '';
  var sec = Math.floor((Date.now() - (typeof ts === 'number' ? ts : Date.parse(ts))) / 1000);
  if (sec < 60) return sec + '초 전';
  if (sec < 3600) return Math.floor(sec / 60) + '분 전';
  if (sec < 86400) return Math.floor(sec / 3600) + '시간 전';
  return Math.floor(sec / 86400) + '일 전';
}

function badge(text, type) {
  return '<span class="badge badge-' + type + '">' + esc(text) + '</span>';
}

// Firebase fetch 헬퍼
function fb(path) {
  return fetch(FB + path + '.json')
    .then(function(r) { return r.json(); })
    .catch(function() { return null; });
}

// RSS XML 파싱 공통 함수
function fetchRSS(rssUrl, maxItems) {
  var url = PROXY + encodeURIComponent(rssUrl);
  return fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data || !data.contents) return [];
      var parser = new DOMParser();
      var xml = parser.parseFromString(data.contents, 'text/xml');
      var items = xml.querySelectorAll('item');
      var result = [];
      for (var i = 0; i < Math.min(items.length, maxItems); i++) {
        var titleEl = items[i].querySelector('title');
        var linkEl = items[i].querySelector('link');
        if (titleEl) {
          result.push({
            title: titleEl.textContent || '',
            link: linkEl ? linkEl.textContent || '' : ''
          });
        }
      }
      return result;
    })
    .catch(function() { return []; });
}

// --- 카드 업데이트 함수들 ---

// PC 상태
function updatePC() {
  fb('/monitor/main_pc/status').then(function(data) {
    var el = document.getElementById('pc-body');
    if (!data) { el.innerHTML = badge('데이터 없음', 'warn'); return; }
    var ts = data.ts || '';
    var up = data.uptime_min || 0;
    var svcs = data.services || {};
    var html = '<div class="item"><span>uptime</span><span>' + up + '분</span></div>';
    Object.entries(svcs).forEach(function(kv) {
      var name = kv[0]; var info = kv[1];
      if (typeof info !== 'object') return;
      var alive = info.alive;
      html += '<div class="item"><span>' + esc(name) + '</span>' + (alive ? badge('ON', 'ok') : badge('OFF', 'err')) + '</div>';
    });
    if (ts) html += '<div style="font-size:11px;color:var(--text-muted);margin-top:4px">' + agoStr(ts) + '</div>';
    el.innerHTML = html;
  });
}

// 날씨 (기상청 API -- 추후 연동, 현재 placeholder)
function updateWeather() {
  var el = document.getElementById('weather-body');
  var now = new Date();
  el.innerHTML = '<div class="card-value">' + esc(now.toLocaleDateString('ko-KR', {month:'long', day:'numeric', weekday:'short'})) + '</div>' +
    '<div class="card-sub">' + esc(now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', hour12:false})) + '</div>';
}

// 근무표
function updateSchedule() {
  var today = new Date().toISOString().slice(0,10);
  fb('/packhelper/storebot_attendance/' + today).then(function(data) {
    var el = document.getElementById('schedule-body');
    if (!data) { el.innerHTML = badge('오늘 출근 기록 없음', 'info'); return; }
    var html = '';
    Object.entries(data).forEach(function(kv) {
      var emp = kv[0]; var info = kv[1];
      if (typeof info === 'object') {
        var start = info.start || info.check_in || '';
        var end = info.end || info.check_out || '';
        var status = end ? badge('퇴근', 'info') : badge('근무중', 'ok');
        html += '<div class="item"><span>' + esc(emp) + ' ' + esc(start) + '</span>' + status + '</div>';
      } else {
        html += '<div class="item"><span>' + esc(emp) + '</span><span>' + esc(String(info)) + '</span></div>';
      }
    });
    el.innerHTML = html || badge('기록 없음', 'info');
  });
}

// 주문 현황
function updateOrder() {
  var today = new Date().toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}).replace(/\./g,'').replace(/\s/g,'').slice(0,4);
  fetch(FB + '/packhelper/capture.json?shallow=true').then(function(r){return r.json()}).then(function(data) {
    var el = document.getElementById('order-body');
    if (!data) { el.innerHTML = '<div class="card-value">0</div><div class="card-sub">오늘 주문</div>'; return; }
    var keys = Object.keys(data);
    var todayKeys = keys.filter(function(k) { return k.startsWith(today + '_'); });
    var count = todayKeys.length;
    el.innerHTML = '<div class="card-value">' + count + '<span style="font-size:14px;color:var(--text-muted)"> 건</span></div>' +
      '<div class="card-sub">오늘 주문</div>';
  });
}

// AI 활동
function updateAI() {
  fb('/packhelper/ai_monitor/apps').then(function(data) {
    var el = document.getElementById('ai-body');
    if (!data) { el.innerHTML = '<div class="card-value">--</div><div class="card-sub">Groq 활동</div>'; return; }
    var html = '';
    Object.entries(data).forEach(function(kv) {
      var app = kv[0]; var metrics = kv[1];
      if (typeof metrics !== 'object') return;
      var items = [];
      Object.entries(metrics).forEach(function(mv) {
        var m = mv[1];
        if (typeof m === 'object' && m.count > 0) {
          items.push(esc(mv[0]) + ': ' + m.count);
        }
      });
      if (items.length > 0) {
        html += '<div class="item"><span style="color:var(--accent-cyan)">' + esc(app) + '</span><span>' + items.join(', ') + '</span></div>';
      }
    });
    el.innerHTML = html || badge('활동 없음', 'info');
  });
}

// 진단 보고서
function updateDiag() {
  fb('/monitor/main_pc/ai_diagnosis').then(function(data) {
    var el = document.getElementById('diag-body');
    if (!data) { el.innerHTML = badge('보고서 없음', 'info'); return; }
    var status = data.status || '?';
    var reason = data.reason || '';
    var ts = data.ts || '';
    var statusBadge = status === '정상' ? badge('정상', 'ok') : status === '경고' ? badge('경고', 'warn') : status === '위험' ? badge('위험', 'err') : badge(status, 'info');
    el.innerHTML = '<div class="item"><span>Groq 자가진단</span>' + statusBadge + '</div>' +
      (reason ? '<div style="font-size:12px;color:var(--text-secondary);margin-top:4px">' + esc(reason) + '</div>' : '') +
      (ts ? '<div style="font-size:11px;color:var(--text-muted);margin-top:4px">' + agoStr(ts) + '</div>' : '');
  });
}

// 알림/경고
function updateAlert() {
  fb('/monitor/main_pc/alert').then(function(data) {
    var el = document.getElementById('alert-body');
    if (!data) { el.innerHTML = badge('알림 없음', 'ok'); return; }
    var items = Object.entries(data).sort().reverse().slice(0, 5);
    if (items.length === 0) { el.innerHTML = badge('알림 없음', 'ok'); return; }
    var html = '';
    items.forEach(function(kv) {
      var a = kv[1];
      var type = a.type || '';
      var reason = a.reason || a.msg || '';
      var ts = a.ts || '';
      var typeBadge = type.indexOf('위험') >= 0 ? badge('위험', 'err') : type.indexOf('경고') >= 0 ? badge('경고', 'warn') : badge(type || '알림', 'info');
      html += '<div class="item"><span>' + typeBadge + ' ' + esc(reason.substring(0,50)) + '</span><span style="color:var(--text-muted)">' + agoStr(ts) + '</span></div>';
    });
    el.innerHTML = html;
  });
}

// 엑셀 정산
function updateExcel() {
  fb('/packhelper/excel_settle_data').then(function(data) {
    var el = document.getElementById('excel-body');
    if (!data) { el.innerHTML = badge('정산 데이터 없음', 'info'); return; }
    var html = '';
    var items = data.items || [];
    items.forEach(function(item) {
      var amt = Number(item.amount || 0).toLocaleString();
      html += '<div class="item"><span>' + esc(item.name || '') + '</span><span>' + amt + '원</span></div>';
    });
    var updated = data.updated || '';
    if (updated) html += '<div style="font-size:11px;color:var(--text-muted);margin-top:6px">수집: ' + esc(updated) + '</div>';
    el.innerHTML = html || badge('내용 없음', 'info');
  });
}

// 스포츠
function updateSports() {
  fb('/packhelper/sports_summary').then(function(data) {
    var el = document.getElementById('sports-body');
    if (!data) { el.innerHTML = badge('스포츠 데이터 없음', 'info'); return; }
    var summary = data.summary || '정보 없음';
    var updated = data.updated || '';
    var html = '<div style="font-size:14px;line-height:1.6;white-space:pre-wrap">' + esc(summary) + '</div>';
    if (updated) html += '<div style="font-size:11px;color:var(--text-muted);margin-top:6px">갱신: ' + esc(updated) + '</div>';
    el.innerHTML = html;
  });
}

// 경제/AI 뉴스 (Google News RSS)
function updateNews() {
  var el = document.getElementById('news-body');
  fetchRSS(NEWS_RSS, 5).then(function(items) {
    if (items.length === 0) {
      el.innerHTML = badge('뉴스 로딩 실패', 'warn');
      return;
    }
    var html = '';
    items.forEach(function(item) {
      // Google News 제목에서 소스 제거 (- 뒤 부분)
      var title = item.title.replace(/ - [^-]+$/, '');
      if (title.length > 40) title = title.substring(0, 40) + '...';
      html += '<a class="news-link" href="' + esc(item.link) + '" target="_blank" rel="noopener">' + esc(title) + '</a>';
    });
    var now = new Date();
    html += '<div style="font-size:10px;color:var(--text-muted);margin-top:4px">' + now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', hour12:false}) + ' 갱신</div>';
    el.innerHTML = html;
  });
}

// SNS 이슈 (Google Trends RSS)
function updateSNS() {
  var el = document.getElementById('sns-body');
  fetchRSS(TRENDS_RSS, 5).then(function(items) {
    if (items.length === 0) {
      el.innerHTML = badge('트렌드 로딩 실패', 'warn');
      return;
    }
    var html = '';
    items.forEach(function(item) {
      var title = item.title;
      if (title.length > 35) title = title.substring(0, 35) + '...';
      html += '<a class="news-link" href="' + esc(item.link) + '" target="_blank" rel="noopener">' + esc(title) + '</a>';
    });
    var now = new Date();
    html += '<div style="font-size:10px;color:var(--text-muted);margin-top:4px">' + now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', hour12:false}) + ' 갱신</div>';
    el.innerHTML = html;
  });
}

// 뉴스/SNS 갱신 (5분 간격 제어)
function updateNewsIfNeeded() {
  var now = Date.now();
  if (now - lastNewsFetch >= NEWS_INTERVAL_MS) {
    lastNewsFetch = now;
    updateNews();
    updateSNS();
  }
}

// --- 전체 갱신 ---
function refreshAll() {
  document.body.classList.add('refreshing');
  updatePC();
  updateWeather();
  updateSchedule();
  updateOrder();
  updateAI();
  updateDiag();
  updateAlert();
  updateExcel();
  updateSports();
  updateNewsIfNeeded();

  var now = new Date();
  document.getElementById('lastUpdate').textContent =
    now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });

  setTimeout(function() { document.body.classList.remove('refreshing'); }, 1000);
}

// 초기 로드 + 30초 자동 갱신
refreshAll();
setInterval(refreshAll, 30000);
</script>
